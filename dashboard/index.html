<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ByrdHouse Command Center</title>
<style>
  :root { --bg:#0a0812; --panel:#141021; --panel2:#1b1530; --line:#2c2347;
          --text:#ece7fb; --dim:#9a8fc0; --accent:#8b5cf6; --accent2:#a78bfa;
          --green:#34d399; --yellow:#fbbf24; --red:#f87171; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font:14px/1.5 -apple-system,'Segoe UI',sans-serif; display:flex; min-height:100vh; }
  a { color:var(--accent2); }

  /* sidebar */
  #side { width:225px; background:var(--panel); border-right:1px solid var(--line); padding:16px 10px; flex-shrink:0; }
  #side h1 { font-size:16px; letter-spacing:.06em; padding:0 8px 4px; }
  #side h1 span { color:var(--accent2); }
  #side .sub { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.14em; padding:0 8px 14px; }
  #side .cap { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.12em; margin:14px 8px 6px; }
  .room { display:flex; align-items:center; gap:8px; width:100%; text-align:left; background:none; border:0; color:var(--text);
          padding:8px 10px; border-radius:8px; cursor:pointer; font-size:13px; }
  .room small { display:block; color:var(--dim); font-size:10px; }
  .room:hover { background:var(--panel2); }
  .room.on { background:linear-gradient(90deg,#2d1f57,#1b1530); outline:1px solid var(--accent); }
  .room .lock { margin-left:auto; font-size:10px; color:var(--dim); border:1px solid var(--line); border-radius:8px; padding:0 6px; }

  /* main */
  #main { flex:1; padding:18px; min-width:0; }
  .topbar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .chip { background:var(--panel); border:1px solid var(--line); border-radius:9px; padding:7px 12px; font-size:12px;
          display:flex; align-items:center; gap:7px; }
  .light { width:9px; height:9px; border-radius:50%; display:inline-block; flex-shrink:0; }
  .green{background:var(--green)} .yellow{background:var(--yellow)} .red{background:var(--red)}
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:14px; }
  .panel { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:14px; }
  .wide { grid-column:1/-1; }
  h2 { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; }
  .stat { background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:12px; }
  .stat b { font-size:26px; display:block; }
  .stat span { color:var(--dim); font-size:11px; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  td,th { padding:4px 6px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--dim); font-weight:600; }
  .pill { padding:1px 8px; border-radius:10px; font-size:11px; border:1px solid var(--line); white-space:nowrap; }
  button.b { background:linear-gradient(90deg,#7c3aed,#6d28d9); border:0; color:#fff; border-radius:8px;
             padding:8px 14px; cursor:pointer; font-size:13px; }
  button.s { background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px;
             padding:6px 12px; cursor:pointer; font-size:12.5px; }
  button.s:hover { border-color:var(--accent); }
  button:disabled { opacity:.45; cursor:default; }
  .busy { border:1px dashed var(--accent); border-radius:10px; background:var(--panel2);
          display:flex; flex-direction:column; align-items:center; justify-content:center;
          aspect-ratio:16/11; gap:6px; color:var(--dim); font-size:12px;
          animation:pulse 1.6s ease-in-out infinite; }
  .busy b { color:var(--accent2); }
  @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }
  button.ok{color:var(--green)} button.no{color:var(--red)}
  input,select,textarea { background:#0d0a18; color:var(--text); border:1px solid var(--line); border-radius:8px;
                          padding:7px 9px; font-size:13px; width:100%; }
  label { font-size:11px; color:var(--dim); display:block; margin:8px 0 2px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:10px; }
  .art { border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--panel2); }
  .art img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#000; }
  .art .m { padding:8px; font-size:11.5px; color:var(--dim); }
  .art .m b { color:var(--text); }
  .row { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  #msg { color:var(--yellow); font-size:12.5px; min-height:18px; margin-top:8px; }
  .muted { color:var(--dim); font-size:12px; }
  .note { background:var(--panel2); border:1px dashed var(--line); border-radius:10px; padding:12px; color:var(--dim); font-size:13px; }
  @media (max-width:820px){
    body{flex-direction:column}
    /* horizontal room strip instead of a stacked wall of buttons */
    #side{width:100%; display:flex; flex-wrap:nowrap; gap:4px; overflow-x:auto;
          -webkit-overflow-scrolling:touch; align-items:center;
          padding:10px max(10px, env(safe-area-inset-right)) 10px max(10px, env(safe-area-inset-left))}
    #side h1{font-size:14px; padding:0 6px; white-space:nowrap}
    #side .sub,#side .cap{display:none}
    #side > div[style]{min-width:150px}
    .room{flex-shrink:0; white-space:nowrap; padding:7px 10px}
    .room small{display:none}
    #main{padding:12px max(12px, env(safe-area-inset-right))
                  max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left))}
    /* 16px inputs stop Safari's focus auto-zoom */
    input,select,textarea{font-size:16px}
  }
  * { -webkit-tap-highlight-color:transparent; }
  button { touch-action:manipulation; }
</style>
</head>
<body>
<nav id="side">
  <h1>🦅 BYRD<span>HOUSE</span></h1>
  <div class="sub">Command Center</div>
  <div id="rooms"></div>
  <div class="cap">Admin</div>
  <div style="padding:0 8px"><label>Admin token</label><input id="token" type="password"></div>
</nav>

<main id="main">
  <div class="topbar" id="statusChips"></div>
  <div id="view"></div>
  <div id="msg"></div>
</main>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
$('token').value = localStorage.getItem('bh_token') || '';
$('token').addEventListener('change', e => localStorage.setItem('bh_token', e.target.value));
const hdrs = () => ({ 'Content-Type':'application/json', 'Authorization':'Bearer '+$('token').value, 'X-Actor':'dashboard' });
const jget = async p => (await fetch(p)).json();
const jpost = async (p, body) => {
  const r = await fetch(p, { method:'POST', headers:hdrs(), body:JSON.stringify(body) });
  const j = await r.json(); if (!r.ok) throw new Error(j.error || r.status); return j;
};
const say = t => $('msg').textContent = t;

/* ── Rooms (ROOM_MAP.md — the rooms are the product) ── */
const ROOMS = [
  { id:'command',  name:'Command Center', sub:'Overview & Status' },
  { id:'image',    name:'Image Studio',   sub:'Generate & Thumbnails' },
  { id:'items',    name:'Generated Items',sub:'Gallery & Review' },
  { id:'content',  name:'Content Pipeline', sub:'Research → Package' },
  { id:'exports',  name:'Exports Room',   sub:'CSV & Reports' },
  { id:'memory',   name:'Memory Room',    sub:'via Cherry Studio' },
  { id:'mcp',      name:'MCP Tools',      sub:'Roster & Pings' },
  { id:'events',   name:'System Room',    sub:'Events & Workers' },
  { id:'realms',   name:'Realms Room',    sub:'Weekend Lane', lock:'U6 belt' },
  { id:'video',    name:'Video Studio',   sub:'Motion', lock:'U5' },
  { id:'coder',    name:'Coder Room',     sub:'Claude Code', lock:'config' },
  { id:'business', name:'Business Room',  sub:'Money Map', lock:'R2' },
  { id:'users',    name:'Users Room',     sub:'Frozen', lock:'demand' },
  { id:'bot',      name:'Bot Room',       sub:'Autonomy Ladder', lock:'after U3' },
];
let room = 'command';
function renderRooms() {
  $('rooms').innerHTML = ROOMS.map(r =>
    `<button class="room ${room===r.id?'on':''}" onclick="go('${r.id}')">
       <span><b>${r.name}</b><small>${r.sub}</small></span>${r.lock?`<span class="lock">${r.lock}</span>`:''}
     </button>`).join('');
}
function go(r) { room = r; renderRooms(); render(); }

/* ── status chips (always visible) ── */
async function chips() {
  try {
    const s = await jget('/status');
    const checks = (s.machine && s.machine.checks) || [];
    const svc = n => { const c = checks.find(x => x.name === 'svc_'+n); return c ? c.state : 'yellow'; };
    const q = s.queue || {};
    $('statusChips').innerHTML =
      `<span class="chip"><span class="light ${(s.machine&&s.machine.overall)||'yellow'}"></span><b>System</b> ${esc(s.machine.host||'no status.json')}</span>`
      + ['lmstudio','comfyui','qdrant','router'].map(n =>
          `<span class="chip"><span class="light ${svc(n)}"></span>${n}</span>`).join('')
      + `<span class="chip">queue: ${Object.entries(q).map(([k,v])=>`${esc(k)} ${v}`).join(' · ') || 'empty'}</span>`
      + (s.workers||[]).map(w => `<span class="chip"><span class="light ${w.status==='online'?'green':'red'}"></span>${esc(w.id)} <span class="pill">${esc(w.status==='online'?w.mode:'offline')}</span></span>`).join('');
    window._status = s;
  } catch(e) { say('status error: '+e.message); }
}

/* ── shared renderers ── */
function artCard(a) {
  const meta = JSON.parse(a.meta || '{}');
  const img = a.kind === 'image' || a.kind === 'thumbnail'
    ? `<img src="/artifacts/${a.id}/file" loading="lazy" onerror="this.style.display='none'">` : '';
  const when = (a.job_finished_at || a.created_at || '').slice(5, 16).replace('T', ' ');
  return `<div class="art">${img}<div class="m">
    <b>${esc(meta.recipe || a.kind)}</b> · ${esc(a.project_id)}<br>
    ${a.score != null ? 'score <b>'+a.score+'</b> · ' : ''}<span class="pill">${esc(a.status)}</span><br>
    ${a.gen_seconds != null ? '⏱ '+fmtDur(a.gen_seconds)+' · ' : ''}<span class="muted">${esc(when)}</span><br>
    ${esc(meta.purpose || meta.title || '')}
    <div class="row">
      <button class="s ok" ${a.status==='approved'?'disabled':''} onclick="review(this,'${a.id}','approve')">${a.status==='approved'?'✓ approved':'approve'}</button>
      <button class="s no" ${a.status==='rejected'?'disabled':''} onclick="review(this,'${a.id}','reject')">${a.status==='rejected'?'✗ rejected':'reject'}</button>
      <button class="s" onclick="refineArt('${a.id}',0.3,2.0)" title="hi-res polish">⬆ upscale</button>
      <button class="s" onclick="refineArt('${a.id}',0.55,1.0)" title="variations near this image">≈ riff</button>
    </div></div></div>`;
}
async function refineArt(id, strength, scale) {
  try {
    const j = await jpost(`/artifacts/${id}/refine`, { strength, scale });
    say(`queued ${j.id} (${strength <= 0.35 ? 'upscale' : 'riff'} of ${id})`);
    render();
  } catch (e) { say('error: '+e.message); }
}
async function review(btn, id, action) {
  btn.disabled = true; btn.textContent = '…';
  try { await jpost(`/artifacts/${id}/review`, { action }); render(); }
  catch (e) { btn.disabled = false; say('error: '+e.message); }
}
async function jobAct(id, action) {
  try { await jpost(`/jobs/${id}/${action}`, {}); say(action+'d '+id); render(); }
  catch (e) { say('error: '+e.message); }
}

/* ── views ── */
const V = {};
V.command = async () => {
  const st = await jget('/stats');
  const arts = await jget('/artifacts?limit=8');
  const ev = await jget('/events?limit=12');
  return `
  <div class="grid">
    <div class="panel wide"><h2>Mission Overview — ByrdHouse is Active</h2>
      <div class="stats">
        <div class="stat"><b>${st.artifacts_total}</b><span>artifacts total</span></div>
        <div class="stat"><b>${st.artifacts_week}</b><span>this week</span></div>
        <div class="stat"><b>${st.by_kind.image||0}</b><span>images</span></div>
        <div class="stat"><b>${st.by_kind.thumbnail||0}</b><span>thumbnails</span></div>
        <div class="stat"><b>${st.jobs_done_week}</b><span>jobs finished (7d)</span></div>
        <div class="stat"><b>${st.avg_score ?? '—'}</b><span>avg judge score</span></div>
        <div class="stat"><b>${st.approved}</b><span>approved</span></div>
      </div></div>
    <div class="panel"><h2>Machine health</h2><table>${
      ((window._status||{}).machine?.checks||[]).map(c =>
        `<tr><td><span class="light ${c.state}"></span></td><td>${esc(c.name)}</td><td class="muted">${esc(c.detail)}</td></tr>`).join('')
      || '<tr><td class="muted">run byrd-status.ps1 (or start-byrdhouse.ps1) to populate</td></tr>'}</table></div>
    <div class="panel"><h2>Recent activity</h2><table>${ev.map(e =>
      `<tr><td class="muted">${esc((e.ts||'').slice(5,16))}</td><td>${esc(e.actor)}</td><td>${esc(e.action)}</td>
       <td>${e.ok?'':'<span class="pill" style="color:var(--red)">failed</span>'}</td></tr>`).join('')}</table></div>
    <div class="panel wide"><h2>Latest artifacts</h2><div class="cards">${arts.map(artCard).join('') || '<span class="muted">nothing yet — visit the Image Studio</span>'}</div></div>
  </div>`;
};

function fmtDur(s) { return s >= 90 ? Math.floor(s/60)+'m '+(s%60)+'s' : s+'s'; }
function ago(ts) {
  if (!ts) return '';
  const m = Math.max(0, Math.round((Date.now() - new Date(ts).getTime()) / 60000));
  return m < 1 ? 'just now' : m + 'm ago';
}
function busyCards(jobs) {
  const gen = t => t==='image.generate'||t==='content.thumbnail';
  return jobs.filter(j => ['queued','claimed','running'].includes(j.status) && gen(j.type))
    .map(j => `<div class="busy"><b>${esc(j.status==='queued'?'queued':'generating…')}</b>
      <span>${esc(j.type)}</span><span>${esc(j.id.slice(-8))}</span>
      <span>${esc(j.status==='queued' ? 'queued '+ago(j.created_at) : 'started '+ago(j.claimed_at))}</span></div>`).join('');
}
async function imgOutHtml() {
  const jobs = await jget('/jobs?limit=30');
  const inflight = busyCards(jobs);
  const arts = (await jget('/artifacts?limit=18')).filter(a => a.kind==='image'||a.kind==='thumbnail');
  return `${inflight}${arts.map(artCard).join('') || (inflight ? '' : '<span class="muted">no images yet</span>')}`;
}
V.image = async () => {
  const recipes = await jget('/recipes');
  // newest version of each recipe first — and the value pins id@version so
  // the version you pick is the version the worker runs
  window._recipes = recipes.filter(r => r.kind === 'image.generate')
    .sort((a, b) => a.id === b.id ? b.version - a.version : a.id.localeCompare(b.id));
  return `
  <div class="grid">
    <div class="panel" id="genForm"><h2>Generate (recipes over prompts)</h2>
      <label>Recipe</label><select id="recipe" onchange="slotFields()">${window._recipes.map(r =>
        `<option value="${esc(r.id)}@${r.version}">${esc(r.id)} v${r.version}</option>`).join('')}</select>
      <div id="slots"></div>
      <label>Thumbnail title (optional — real text composited on top, never diffused)</label>
      <input id="thumbTitle" placeholder="e.g. BEST BUILDS TIER LIST (leave empty for art only)">
      <label>Source image (optional — path on the worker PC; composites the title onto YOUR screenshot, skips generation)</label>
      <input id="srcImage" placeholder="E:\\captures\\palworld_base.png">
      <label>Project</label><input id="project" value="careyrpg">
      <label>Purpose (required)</label><input id="purpose" placeholder="why this batch exists">
      <label>Checkpoint (optional — name of a .safetensors installed on the worker)</label>
      <input id="ckpt" placeholder="leave empty for the recipe default">
      <label>Shape</label><select id="aspect">
        <option value="">16:9 thumbnail (default)</option>
        <option value="9:16">9:16 TikTok / Shorts</option>
        <option value="1:1">1:1 square</option>
        <option value="2:3">2:3 portrait / player model</option>
        <option value="3:2">3:2 landscape photo</option>
        <option value="21:9">21:9 banner</option>
      </select>
      <label>LoRA (optional — a .safetensors in the worker's models\\loras folder)</label>
      <input id="lora" placeholder="e.g. palworld_style">
      <label style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <input type="checkbox" id="enhance" style="width:auto">
        ✨ Let the operator model rewrite my prompt first (freeform recipe)</label>
      <div class="row"><button class="b" onclick="submitGen()">Queue generation</button></div>
      <div class="muted" style="margin-top:8px">Batch generates → auto-judged by Qwen-VL → approve here. Approved images are your thumbnail art.<br>
      GPU mode shifts automatically with the queue — the worker chip up top shows the live mode.</div>
    </div>
    <div class="panel"><h2>Reference library — the bar to beat</h2>
      <label>Tag (game or recipe family, e.g. palworld)</label><input id="refTag" placeholder="palworld">
      <label>Add thumbnails you love (the judge grades new images against these)</label>
      <input id="refFile" type="file" accept="image/*" multiple onchange="uploadRefs(this)">
      <div class="cards" id="refList" style="margin-top:10px">${await refListHtml()}</div>
    </div>
    <div class="panel wide"><h2>Image Studio output</h2><div class="cards" id="imgOut">${await imgOutHtml()}</div></div>
  </div>`;
};
async function refListHtml() {
  const refs = await jget('/references');
  return refs.map(r => `<div class="art"><img src="/references/${esc(r.tag)}/${esc(r.name)}/file" loading="lazy">
    <div class="m"><b>${esc(r.tag)}</b> · ${esc(r.name)}</div></div>`).join('')
    || '<span class="muted">no references yet — add the thumbnails you wish you\'d made</span>';
}
async function uploadRefs(input) {
  const tag = ($('refTag').value.trim().toLowerCase().replace(/[^\w-]+/g, '-')) || 'general';
  try {
    for (const f of input.files) {
      const name = f.name.replace(/[^\w. -]+/g, '_');
      const r = await fetch(`/references/${tag}/${name}`, {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + $('token').value, 'X-Actor': 'dashboard' },
        body: f });
      if (!r.ok) throw new Error((await r.json()).error || r.status);
    }
    say(`added ${input.files.length} reference(s) under "${tag}"`);
    input.value = '';
    $('refList').innerHTML = await refListHtml();
  } catch (e) { say('reference upload error: ' + e.message); }
}
function slotFields() {
  const r = (window._recipes||[]).find(x => x.id + '@' + x.version === $('recipe').value);
  if (!r) return;
  const keep = {};  // survive a recipe change without losing typed slot values
  document.querySelectorAll('#slots input').forEach(i => { keep[i.dataset.slot] = i.value; });
  $('slots').innerHTML = r.slots.filter(s => !r.vary.includes(s)).map(s =>
    `<label>${esc(s)}</label><input data-slot="${esc(s)}" placeholder="${esc(s)}">`).join('');
  document.querySelectorAll('#slots input').forEach(i => { if (keep[i.dataset.slot]) i.value = keep[i.dataset.slot]; });
}

/* ── draft-persistence: the Image Studio form survives polling, room
      changes, and reloads; cleared only after a successful queue ── */
const DRAFT_KEY = 'bh_draft';
function readForm() {
  const slots = {};
  document.querySelectorAll('#slots input').forEach(i => { if (i.value) slots[i.dataset.slot] = i.value; });
  return { recipe: $('recipe') ? $('recipe').value : '', slots,
           title: $('thumbTitle') ? $('thumbTitle').value : '',
           src: $('srcImage') ? $('srcImage').value : '',
           project: $('project') ? $('project').value : 'careyrpg',
           purpose: $('purpose') ? $('purpose').value : '' };
}
function saveDraft() { localStorage.setItem(DRAFT_KEY, JSON.stringify(readForm())); }
function loadDraft() {
  try { return JSON.parse(localStorage.getItem(DRAFT_KEY)) || null; } catch (e) { return null; }
}
function clearDraft() { localStorage.removeItem(DRAFT_KEY); }
function applyDraft(d) {
  if (!d) return;
  const sel = $('recipe');
  if (d.recipe && [...sel.options].some(o => o.value === d.recipe)) sel.value = d.recipe;
  slotFields();
  document.querySelectorAll('#slots input').forEach(i => {
    if (d.slots && d.slots[i.dataset.slot] != null) i.value = d.slots[i.dataset.slot]; });
  $('thumbTitle').value = d.title || '';
  $('srcImage').value = d.src || '';
  $('project').value = d.project || 'careyrpg';
  $('purpose').value = d.purpose || '';
}
/* ── end draft-persistence ── */

async function submitGen() {
  try {
    const d = readForm();
    if (!d.purpose) throw new Error('purpose is required');
    const title = d.title.trim();
    const src = d.src.trim();
    if (src && !title) throw new Error('a source image needs a title to composite');
    const payload = { recipe:d.recipe, slots:d.slots, project:d.project, purpose:d.purpose };
    if (title) payload.title = title;
    if (src) payload.image_path = src;
    const ckpt = $('ckpt') ? $('ckpt').value.trim() : '';
    if (ckpt) payload.checkpoint = ckpt;
    const aspect = $('aspect') ? $('aspect').value : '';
    if (aspect) payload.aspect = aspect;
    const lora = $('lora') ? $('lora').value.trim() : '';
    if (lora) payload.lora = lora;
    const enhance = $('enhance') && $('enhance').checked && !title && !src && payload.slots.prompt;
    const type = (src || title) ? 'content.thumbnail' : enhance ? 'content.enhance' : 'image.generate';
    const j = await jpost('/jobs', { type,
      project:d.project,
      required_mode: src ? 'ANY' : enhance ? 'OPERATOR' : 'IMAGE',
      required_caps: src ? [] : enhance ? ['lmstudio'] : ['comfyui'], payload });
    say('queued '+j.id+(src?' (title onto your image)':title?' (two-pass thumbnail)':enhance?' (prompt enhancement first)':''));
    clearDraft();                       // only a successful queue clears the draft
    $('view').innerHTML = '';           // force a fresh (empty) form
    render();

function typingInView() {
  const ae = document.activeElement;
  return ae && $('view').contains(ae) && ['INPUT','TEXTAREA','SELECT'].includes(ae.tagName);
}
async function render() {
  try {
    if (room === 'image' && $('genForm')) {
      // form already on screen: refresh only the output grid, never the form
      $('imgOut').innerHTML = await imgOutHtml();
      return;
    }
    if (typingInView()) return;  // never replace controls under the user's cursor
    $('view').innerHTML = await V[room]();
    if (room === 'image') {
      slotFields();
      applyDraft(loadDraft());
      $('genForm').addEventListener('input', saveDraft);
      $('genForm').addEventListener('change', saveDraft);
    }
  } catch (e) { say('render error: '+e.message); }
}
let _refreshing = false;
async function tick() {
  if (_refreshing) return;  // no overlapping refresh cycles
  _refreshing = true;
  try { await chips(); await render(); } finally { _refreshing = false; }
}
function activeJobs() {
  const q = (window._status||{}).queue || {};
  return (q.queued||0) + (q.claimed||0) + (q.running||0);
}
async function loop() {
  if (!document.hidden) await tick();
  setTimeout(loop, activeJobs() ? 4000 : 15000);  // poll fast only while jobs are in flight
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) tick(); });
renderRooms(); loop();
</script>
