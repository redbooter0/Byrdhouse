<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ByrdHouse</title>
<style>
  :root { --bg:#0a0812; --panel:#141021; --panel2:#1b1530; --line:#2c2347;
          --text:#ece7fb; --dim:#9a8fc0; --accent:#8b5cf6; --accent2:#a78bfa;
          --green:#34d399; --yellow:#fbbf24; --red:#f87171; }
  * { box-sizing:border-box; margin:0; }
  body { color:var(--text); font:14px/1.5 -apple-system,'Segoe UI',sans-serif; display:flex; flex-direction:column; min-height:100vh;
         background:radial-gradient(1200px 600px at 80% -10%, #1e1440 0%, var(--bg) 55%) fixed var(--bg); }
  a { color:var(--accent2); }

  /* ── top nav bar ── */
  #topnav { display:flex; align-items:center; gap:0; border-bottom:1px solid var(--line);
            background:var(--panel); padding:0 16px; height:52px; flex-shrink:0; }
  #brand { height:32px; margin-right:8px; filter:drop-shadow(0 0 10px rgba(139,92,246,.3)); }
  .navtabs { display:flex; gap:2px; flex:1; }
  .tab { background:none; border:0; color:var(--dim); padding:14px 16px; cursor:pointer;
         font-size:14px; font-weight:500; border-bottom:2px solid transparent; transition:all .15s; }
  .tab:hover { color:var(--text); }
  .tab.on { color:var(--accent2); border-bottom-color:var(--accent); }
  .tab .ticon { margin-right:6px; }
  .sysbar { display:flex; align-items:center; gap:10px; margin-left:auto; }
  .sysdot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  #sysLabel { font-size:11px; color:var(--dim); cursor:pointer; display:flex; align-items:center; gap:5px; }
  #sysLabel:hover { color:var(--text); }
  .gear { background:none; border:0; color:var(--dim); font-size:16px; cursor:pointer; padding:4px 6px; }
  .gear:hover { color:var(--accent2); }

  /* ── main ── */
  #main { flex:1; padding:20px; max-width:1200px; width:100%; margin:0 auto; min-width:0; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:14px; }
  .panel { background:linear-gradient(180deg, rgba(139,92,246,.05), transparent 42%) var(--panel);
           border:1px solid var(--line); border-radius:12px; padding:16px; transition:border-color .18s; }
  .panel:hover { border-color:#3b2f63; }
  .wide { grid-column:1/-1; }
  h2 { font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px; }
  .stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:10px; }
  .stat { background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:12px; text-align:center; }
  .stat b { font-size:28px; display:block; color:var(--accent2); text-shadow:0 0 18px rgba(139,92,246,.35); }
  .stat span { color:var(--dim); font-size:11px; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  td,th { padding:4px 6px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top; }
  th { color:var(--dim); font-weight:600; }
  .pill { padding:1px 8px; border-radius:10px; font-size:11px; border:1px solid var(--line); white-space:nowrap; }
  button.b { background:linear-gradient(90deg,#7c3aed,#6d28d9); border:0; color:#fff; border-radius:8px;
             padding:8px 14px; cursor:pointer; font-size:13px; }
  button.s { background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px;
             padding:6px 12px; cursor:pointer; font-size:12.5px; }
  button.s:hover { border-color:var(--accent); }
  button:disabled { opacity:.45; cursor:default; }
  button.ok{color:var(--green)} button.no{color:var(--red)}
  input,select,textarea { background:#0d0a18; color:var(--text); border:1px solid var(--line); border-radius:8px;
                          padding:7px 9px; font-size:13px; width:100%; }
  label { font-size:11px; color:var(--dim); display:block; margin:8px 0 2px; }
  #msg { color:var(--yellow); font-size:12.5px; min-height:18px; margin-top:8px; }
  .muted { color:var(--dim); font-size:12px; }

  /* ── cards (gallery) ── */
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
  .art { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--panel2);
         transition:transform .15s, border-color .15s, box-shadow .15s; }
  .art:hover { transform:translateY(-2px); border-color:var(--accent);
               box-shadow:0 6px 22px rgba(124,58,237,.22); }
  .art img { width:100%; aspect-ratio:16/9; object-fit:cover; display:block; background:#000; cursor:zoom-in; }
  .art .m { padding:10px; font-size:12px; color:var(--dim); }
  .art .m b { color:var(--text); }
  .row { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }

  /* ── lightbox ── */
  .lightbox { position:fixed; inset:0; background:rgba(6,4,14,.92); z-index:50;
              display:flex; align-items:center; justify-content:center; cursor:zoom-out;
              padding:max(16px, env(safe-area-inset-top)); }
  .lightbox img { max-width:96vw; max-height:92vh; border-radius:10px;
                  box-shadow:0 0 60px rgba(124,58,237,.35); }

  /* ── busy/progress cards ── */
  .busy { border:1px dashed var(--accent); border-radius:12px; background:var(--panel2);
          display:flex; flex-direction:column; align-items:center; justify-content:center;
          aspect-ratio:16/9; gap:6px; color:var(--dim); font-size:12px;
          animation:pulse 1.6s ease-in-out infinite; }
  .busy b { color:var(--accent2); font-size:14px; }
  @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }

  /* ── hero section (Home) ── */
  .hero { text-align:center; padding:24px 0 20px; }
  .hero h1 { font-size:22px; font-weight:600; color:var(--text); margin-bottom:4px; }
  .hero p { color:var(--dim); font-size:13px; }
  .approval-card { border:2px solid var(--yellow); border-radius:12px; }
  .approval-card .badge { background:var(--yellow); color:#000; font-size:10px; font-weight:700;
                           padding:2px 8px; border-radius:0 0 8px 8px; display:inline-block; margin-bottom:4px; }

  /* ── chat ── */
  .chatlog { max-height:56vh; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding:6px 2px 12px; }
  .bubble { max-width:82%; padding:9px 12px; border-radius:12px; font-size:13.5px; white-space:pre-wrap; word-break:break-word; }
  .bubble.user { align-self:flex-end; background:linear-gradient(90deg,#7c3aed,#6d28d9); color:#fff; }
  .bubble.assistant { align-self:flex-start; background:var(--panel2); border:1px solid var(--line); }
  .bubble .who { display:block; font-size:10px; color:var(--dim); margin-top:5px; }

  /* ── system panel (overlay) ── */
  #sysOverlay { display:none; position:fixed; inset:0; z-index:40; }
  #sysOverlay.open { display:flex; }
  #sysBg { position:absolute; inset:0; background:rgba(6,4,14,.7); }
  #sysPanel { position:absolute; right:0; top:0; bottom:0; width:min(480px,90vw); background:var(--panel);
              border-left:1px solid var(--line); overflow-y:auto; padding:20px; z-index:1; }
  #sysPanel h2 { margin-top:16px; }
  #sysPanel h2:first-child { margin-top:0; }

  /* ── tooltip ── */
  .q { display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px;
       border-radius:50%; border:1px solid var(--line); color:var(--dim); font-size:10px;
       cursor:pointer; margin-left:5px; vertical-align:middle; user-select:none; }
  .q:hover { border-color:var(--accent); color:var(--accent2); }
  #tipbubble { position:fixed; z-index:60; max-width:260px; background:var(--panel2);
               border:1px solid var(--accent); border-radius:9px; padding:9px 11px;
               font-size:12px; color:var(--text); line-height:1.45;
               box-shadow:0 6px 24px rgba(0,0,0,.5); }

  details.opts { margin-top:12px; border-top:1px solid var(--line); padding-top:8px; }
  details.opts > summary { cursor:pointer; font-size:11px; color:var(--dim);
       text-transform:uppercase; letter-spacing:.1em; list-style:none; }
  details.opts > summary::-webkit-details-marker { display:none; }
  details.opts > summary::before { content:'+ '; }
  details.opts[open] > summary::before { content:'- '; }
  .note { background:var(--panel2); border:1px dashed var(--line); border-radius:10px; padding:12px; color:var(--dim); font-size:13px; }
  .filter-bar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
  .filter-btn { background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:5px 12px;
                color:var(--dim); font-size:12px; cursor:pointer; }
  .filter-btn:hover, .filter-btn.on { border-color:var(--accent); color:var(--accent2); }

  @media (max-width:820px){
    #topnav { padding:0 max(8px, env(safe-area-inset-left)); height:48px; }
    .tab { padding:12px 10px; font-size:13px; }
    .tab .ticon { margin-right:3px; }
    #brand { height:26px; }
    #main { padding:12px max(12px, env(safe-area-inset-right))
                  max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left)); }
    .cards { grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:10px; }
    input,select,textarea { font-size:16px; }
    .hero h1 { font-size:18px; }
    .stats { grid-template-columns:repeat(3,1fr); }
  }
  * { -webkit-tap-highlight-color:transparent; }
  button { touch-action:manipulation; }
</style>
</head>
<body>

<nav id="topnav">
  <img id="brand" src="/logo.png" alt="ByrdHouse" onerror="this.outerHTML='<span style=\"font-size:18px;font-weight:700;margin-right:8px\">&#x1F985;</span>'">
  <div class="navtabs">
    <button class="tab on" data-tab="home" onclick="go('home')"><span class="ticon">&#x1F3E0;</span>Home</button>
    <button class="tab" data-tab="create" onclick="go('create')"><span class="ticon">&#x2728;</span>Create</button>
    <button class="tab" data-tab="library" onclick="go('library')"><span class="ticon">&#x1F4DA;</span>Library</button>
  </div>
  <div class="sysbar">
    <span id="sysLabel" onclick="toggleSystem()"><span class="sysdot green" id="sysDot"></span> <span id="sysText">OK</span></span>
    <button class="gear" onclick="toggleSystem()" title="System &amp; diagnostics">&#x2699;&#xFE0F;</button>
  </div>
</nav>

<main id="main">
  <div id="view"></div>
  <div id="msg"></div>
</main>

<div id="sysOverlay">
  <div id="sysBg" onclick="toggleSystem()"></div>
  <div id="sysPanel"></div>
</div>

<script>
const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ── admin token: stored, never shown on main UI ── */
let _adminToken = localStorage.getItem('bh_token') || '';
const hdrs = () => ({ 'Content-Type':'application/json', 'Authorization':'Bearer '+_adminToken, 'X-Actor':'dashboard' });
const jget = async p => (await fetch(p)).json();
const jpost = async (p, body) => {
  const r = await fetch(p, { method:'POST', headers:hdrs(), body:JSON.stringify(body) });
  const j = await r.json(); if (!r.ok) throw new Error(j.error || r.status); return j;
};
const say = t => { $('msg').textContent = t; };

/* ── tooltips ── */
const qtip = text => `<span class="q" onclick="showTip(event)" data-tip="${esc(text)}">?</span>`;
function showTip(e) {
  e.stopPropagation();
  const old = $('tipbubble'); if (old) old.remove();
  const b = document.createElement('div');
  b.id = 'tipbubble'; b.textContent = e.currentTarget.dataset.tip;
  document.body.appendChild(b);
  const r = e.currentTarget.getBoundingClientRect();
  b.style.left = Math.max(8, Math.min(window.innerWidth - b.offsetWidth - 8, r.left)) + 'px';
  b.style.top = (r.bottom + b.offsetHeight + 8 > window.innerHeight ? r.top - b.offsetHeight - 6 : r.bottom + 6) + 'px';
}
document.addEventListener('click', () => { const b = $('tipbubble'); if (b) b.remove(); });

/* ── navigation ── */
let room = 'home';
function go(r) {
  room = r;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.tab === r));
  render();
}

/* ── system indicator (compact — replaces the old chip bar) ── */
async function updateSystemDot() {
  try {
    const s = await jget('/status');
    window._status = s;
    const overall = (s.machine && s.machine.overall) || 'yellow';
    $('sysDot').className = 'sysdot ' + overall;
    const q = s.queue || {};
    const active = (q.queued||0) + (q.claimed||0) + (q.running||0);
    if (overall === 'green' && active === 0) $('sysText').textContent = 'OK';
    else if (overall === 'green' && active > 0) $('sysText').textContent = active + ' working';
    else if (overall === 'yellow') $('sysText').textContent = 'check system';
    else $('sysText').textContent = 'issue';
  } catch(e) { $('sysDot').className = 'sysdot red'; $('sysText').textContent = 'offline'; }
}

/* ── system panel (slide-out) ── */
function toggleSystem() {
  const o = $('sysOverlay');
  if (o.classList.contains('open')) { o.classList.remove('open'); return; }
  o.classList.add('open');
  renderSystemPanel();
}
async function renderSystemPanel() {
  const s = window._status || {};
  const checks = (s.machine && s.machine.checks) || [];
  const ev = await jget('/events?limit=30');
  const jobs = await jget('/jobs?limit=20');
  const workers = s.workers || [];

  $('sysPanel').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h2 style="margin:0">System &amp; Diagnostics</h2>
      <button class="s" onclick="toggleSystem()">Close</button>
    </div>
    <div style="margin-bottom:16px">
      <label>Admin token</label>
      <input type="password" value="${esc(_adminToken)}" onchange="_adminToken=this.value;localStorage.setItem('bh_token',this.value)" placeholder="paste token here">
    </div>
    <h2>Service Health</h2>
    <table>${checks.map(c =>
      `<tr><td><span class="sysdot ${c.state}" style="display:inline-block"></span></td>
       <td>${esc(c.name)}</td><td class="muted">${esc(c.detail)}</td></tr>`).join('')
      || '<tr><td class="muted">run byrd-status.ps1 to populate</td></tr>'}</table>
    <h2>Workers</h2>
    <table>${workers.map(w =>
      `<tr><td><span class="sysdot ${w.status==='online'?'green':'red'}" style="display:inline-block"></span></td>
       <td>${esc(w.id)}</td><td><span class="pill">${esc(w.status==='online'?w.mode:'offline')}</span></td></tr>`).join('')
      || '<tr><td class="muted">no workers connected</td></tr>'}</table>
    <h2>Jobs</h2>
    <table><tr><th>type</th><th>status</th><th>when</th><th></th></tr>${
      jobs.map(j => `<tr>
        <td>${esc(j.type)}</td>
        <td><span class="pill">${esc(j.status)}</span></td>
        <td class="muted">${esc((j.created_at||'').slice(5,16).replace('T',' '))}</td>
        <td>${['dead','cancelled','claimed','running'].includes(j.status)
              ? `<button class="s ok" onclick="jobAct('${j.id}','requeue')">requeue</button>` : ''}
            ${j.status==='queued'
              ? `<button class="s no" onclick="jobAct('${j.id}','cancel')">cancel</button>` : ''}</td></tr>`).join('')}</table>
    <h2>Event Log</h2>
    <table>${ev.map(e =>
      `<tr><td class="muted">${esc((e.ts||'').slice(5,19))}</td><td>${esc(e.actor)}</td>
       <td>${esc(e.action)}</td><td>${e.ok?'':'<span class="pill" style="color:var(--red)">fail</span>'}</td></tr>`).join('')}</table>
    <h2>Exports</h2>
    <div class="row">
      <button class="s" onclick="queueSimple('export.csv',{what:'artifacts'},'ANY')">Export artifacts CSV</button>
      <button class="s" onclick="queueSimple('export.csv',{what:'jobs'},'ANY')">Export jobs CSV</button>
      <button class="s" onclick="queueSimple('report.daily',{},'ANY')">Daily report</button>
    </div>`;
}

/* ── helpers ── */
function fmtDur(s) { return s >= 90 ? Math.floor(s/60)+'m '+(s%60)+'s' : s+'s'; }
function ago(ts) {
  if (!ts) return '';
  const m = Math.max(0, Math.round((Date.now() - new Date(ts).getTime()) / 60000));
  return m < 1 ? 'just now' : m + 'm ago';
}
function zoom(src) {
  const o = document.createElement('div');
  o.className = 'lightbox';
  o.innerHTML = `<img src="${src}">`;
  o.onclick = () => o.remove();
  document.body.appendChild(o);
}
async function jobAct(id, action) {
  try { await jpost(`/jobs/${id}/${action}`, {}); say(action + 'd'); render(); }
  catch (e) { say('error: ' + e.message); }
}
async function queueSimple(type, payload, mode) {
  try {
    const j = await jpost('/jobs', { type, required_mode:mode, payload,
      required_caps: mode==='OPERATOR' ? ['lmstudio'] : [] });
    say('queued');
  } catch (e) { say('error: ' + e.message); }
}

/* ── artifact card (shared across views) ── */
function artCard(a, opts) {
  opts = opts || {};
  const meta = JSON.parse(a.meta || '{}');
  let jn = {}; try { jn = JSON.parse(a.judge_notes || '{}') || {}; } catch (e) {}
  const img = a.kind === 'image' || a.kind === 'thumbnail'
    ? `<img src="/artifacts/${a.id}/file" loading="lazy" onclick="zoom(this.src)" onerror="this.style.display='none'">` : '';
  const when = (a.job_finished_at || a.created_at || '').slice(5, 16).replace('T', ' ');
  const needsReview = a.status === 'needs_review';
  const cls = needsReview && opts.showApproval ? 'art approval-card' : 'art';
  return `<div class="${cls}">
    ${needsReview && opts.showApproval ? '<span class="badge">NEEDS YOUR REVIEW</span>' : ''}
    ${img}<div class="m">
    <b>${esc(meta.recipe || a.kind)}</b> · ${esc(a.project_id)}<br>
    ${a.score != null ? 'score <b>'+a.score+'</b> · ' : (jn.unjudged ? '<span style="color:var(--yellow)">waiting for judge</span> · ' : '')}<span class="pill">${esc(a.status)}</span>
    ${a.gen_seconds != null ? ' · ' + fmtDur(a.gen_seconds) : ''}<br>
    ${(meta.out_size || meta.size) ? '<span class="muted">' + esc(meta.out_size || meta.size) + '</span><br>' : ''}
    ${esc(meta.purpose || meta.title || '')}
    <div class="row">
      <button class="s ok" ${a.status==='approved'?'disabled':''} onclick="review(this,'${a.id}','approve')">approve</button>
      <button class="s no" ${a.status==='rejected'?'disabled':''} onclick="review(this,'${a.id}','reject')">reject</button>
      <button class="s" onclick="refineArt('${a.id}',0.4,1.5)" title="upscale 1.5x">upscale</button>
      <button class="s" onclick="refineArt('${a.id}',0.55,1.0)" title="variations near this image">riff</button>
    </div></div></div>`;
}
async function review(btn, id, action) {
  btn.disabled = true; btn.textContent = '...';
  try { await jpost(`/artifacts/${id}/review`, { action }); render(); }
  catch (e) { btn.disabled = false; say('error: ' + e.message); }
}
async function refineArt(id, strength, scale) {
  try {
    const j = await jpost(`/artifacts/${id}/refine`, { strength, scale });
    say('queued ' + (scale > 1.0 ? 'upscale' : 'riff'));
    render();
  } catch (e) { say('error: ' + e.message); }
}

/* ══════════════════════════════════════════════════
   VIEW: HOME — living command center
   ══════════════════════════════════════════════════ */
const V = {};
V.home = async () => {
  const [st, jobs, arts] = await Promise.all([
    jget('/stats'), jget('/jobs?limit=30'), jget('/artifacts?limit=12')
  ]);
  const pending = arts.filter(a => a.status === 'needs_review');
  const approved = arts.filter(a => a.status === 'approved').slice(0, 4);
  const inflight = jobs.filter(j => ['queued','claimed','running'].includes(j.status)
    && (j.type === 'image.generate' || j.type === 'content.thumbnail' || j.type === 'image.refine'));
  const recent = arts.filter(a => a.kind === 'image' || a.kind === 'thumbnail').slice(0, 6);

  return `
  <div class="hero">
    <h1>What are we making today?</h1>
    <p>${st.artifacts_total ? st.artifacts_total + ' artifacts created' : 'Your AI studio is ready'}</p>
  </div>
  <div class="grid">
    ${inflight.length ? `<div class="panel wide"><h2>In Progress</h2>
      <div class="cards">${inflight.map(j =>
        `<div class="busy"><b>${j.status === 'queued' ? 'Queued' : 'Creating...'}</b>
        <span>${friendlyType(j.type)}</span>
        <span>${esc(j.status === 'queued' ? 'queued ' + ago(j.created_at) : 'started ' + ago(j.claimed_at))}</span></div>`
      ).join('')}</div></div>` : ''}

    ${pending.length ? `<div class="panel wide"><h2>Ready for Your Review (${pending.length})</h2>
      <div class="cards">${pending.map(a => artCard(a, {showApproval:true})).join('')}</div></div>` : ''}

    <div class="panel"><h2>This Week</h2>
      <div class="stats">
        <div class="stat"><b>${st.artifacts_week}</b><span>created</span></div>
        <div class="stat"><b>${st.approved}</b><span>approved</span></div>
        <div class="stat"><b>${st.avg_score ?? '--'}</b><span>avg score</span></div>
      </div></div>

    <div class="panel"><h2>Quick Actions</h2>
      <div class="row">
        <button class="b" onclick="go('create')">Create something new</button>
        <button class="s" onclick="go('library')">Browse library</button>
      </div></div>

    ${recent.length ? `<div class="panel wide"><h2>Recent Work</h2>
      <div class="cards">${recent.map(a => artCard(a)).join('')}</div></div>` : ''}
  </div>`;
};
function friendlyType(t) {
  return { 'image.generate':'Image generation', 'content.thumbnail':'Thumbnail',
           'image.refine':'Upscale / riff', 'image.judge':'Auto-judging',
           'image.faceswap':'Face swap',

/* ── Create helpers ── */
async function refListHtml() {
  const refs = await jget('/references');
  return refs.map(r => `<div class="art"><img src="/references/${esc(r.tag)}/${esc(r.name)}/file" loading="lazy">
    <div class="m"><b>${esc(r.tag)}</b> · ${esc(r.name)}</div></div>`).join('')
    || '<span class="muted">upload the thumbnails you wish you had made</span>';
}
async function uploadRefs(input) {
  const tag = ($('refTag').value.trim().toLowerCase().replace(/[^\w-]+/g, '-')) || 'general';
  try {
    for (const f of input.files) {
      const name = f.name.replace(/[^\w. -]+/g, '_');
      await fetch(`/references/${tag}/${name}`, {
        method: 'POST', headers: { 'Authorization': 'Bearer ' + _adminToken, 'X-Actor': 'dashboard' }, body: f });
    }
    say(`added ${input.files.length} reference(s)`);
    input.value = '';
    $('refList').innerHTML = await refListHtml();
  } catch (e) { say('reference upload error: ' + e.message); }
}
async function uploadSource(input) {
  const f = input.files && input.files[0];
  if (!f) return;
  const name = f.name.replace(/[^\w. -]+/g, '_');
  const project = $('project') ? $('project').value.trim() || 'careyrpg' : 'careyrpg';
  say('uploading...');
  try {
    const r = await fetch(`/sources/${encodeURIComponent(name)}?project=${encodeURIComponent(project)}`, {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + _adminToken, 'X-Actor': 'dashboard' }, body: f });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || r.status);
    window._srcArtifact = { id: j.id, name };
    $('srcPreview').innerHTML =
      `<span style="color:var(--green)">saved</span> ${esc(name)}`
      + `<br><img src="/artifacts/${esc(j.id)}/file" style="height:52px;border-radius:6px;margin-top:4px">`
      + `<br><button class="s" onclick="clearSource()" style="margin-top:4px">remove</button>`;

}
function clearSource() {
  window._srcArtifact = null;
  if ($('srcFile')) $('srcFile').value = '';
  if ($('srcPreview')) $('srcPreview').innerHTML = '';
  saveDraft();
}

async function submitSwap() {
  const t = window._swapTarget;
  if (!t) return swapSay('upload a picture to swap onto first');
  const project = ($('project') ? $('project').value.trim() : '') || 'careyrpg';
  const payload = {

/* The recipe currently selected in the form (id@version pinned). */
function currentRecipe() {
  return (window._recipes||[]).find(
    x => x.id + '@' + x.version === ($('recipe') ? $('recipe').value : ''));
}
function requiredSlots(r) {
  r = r || currentRecipe();
  return r ? r.slots.filter(s => !r.vary.includes(s)) : [];
}
function missingRequiredSlots(vals) {
  return requiredSlots().filter(s => !String((vals && vals[s]) || '').trim());
}
function slotFields() {
  const r = currentRecipe();
  if (!r) return;
  const keep = {};
  document.querySelectorAll('#slots input').forEach(i => { keep[i.dataset.slot] = i.value; });
  const slotMeta = r.slot_meta || {};
  $('slots').innerHTML = requiredSlots(r).map(s => {
    const meta = slotMeta[s] || {};
    const lbl = meta.label || s;
    const def = meta.default || '';
    return `<label>${esc(lbl)} <span style="color:var(--red)">*</span></label>` +
      `<input data-slot="${esc(s)}" required placeholder="${esc(def || lbl)}">`;
  }).join('');
  document.querySelectorAll('#slots input').forEach(i => { if (keep[i.dataset.slot]) i.value = keep[i.dataset.slot]; });
}
async function showRecipeInfo() {
  const r = currentRecipe();
  const el = $('recipeInfo');
  if (!el || !r) return;
  const note = (r.note || '').split('.')[0];
  el.innerHTML = note ? esc(note) : '';
  const ps = $('profileStatus');
  if (!ps) return;
  if (r.subject_profile) {
    try {
      const profiles = await jget('/profiles');

        ps.innerHTML = `<span style="color:var(--green)">Identity: ${esc(p.display_name)} (${p.references} photo${p.references>1?'s':''})</span>`;
      } else if (p) {
        ps.innerHTML = `<span style="color:var(--yellow)">Identity: ${esc(p.display_name)} — add reference photos first</span>`;
      } else {
        ps.innerHTML = `<span style="color:var(--red)">Profile "${esc(r.subject_profile)}" not found</span>`;
      }
    } catch(e) { ps.innerHTML = ''; }
  } else { ps.innerHTML = ''; }
}
function busyCards(jobs) {
  const gen = t => t==='image.generate'||t==='content.thumbnail'||t==='image.refine';
  return jobs.filter(j => ['queued','claimed','running'].includes(j.status) && gen(j.type))

async function createOutputHtml() {

/* ── engine controls (power-user panel) ── */
window._engineData = null;
async function loadEngineControls() {
  const el = $('engineControls');

    const [nodesResp, ckptResp, loraResp] = await Promise.all([
      jget('/comfy/nodes'), jget('/comfy/models/checkpoints'), jget('/comfy/models/loras')

      el.innerHTML = '<span style="color:var(--yellow)">ComfyUI offline — defaults will be used</span>';

    }
    const ks = (nodesResp.nodes || {}).KSampler || {};
    const ckpts = (ckptResp.models || []);
    const loras = (loraResp.models || []);
    window._engineData = { nodes: nodesResp.nodes, checkpoints: ckpts, loras: loras };

    const samplerOpts = (ks.sampler_name && ks.sampler_name.options || []);
    const schedulerOpts = (ks.scheduler && ks.scheduler.options || []);
    const stepsInfo = ks.steps || {};
    const cfgInfo = ks.cfg || {};
    let html = '';
    html += '<label>Checkpoint</label><select id="engCkpt"><option value="">recipe default</option>';
    ckpts.forEach(c => { html += `<option value="${esc(c)}">${esc(c.replace(/\.safetensors$/,''))}</option>`; });
    html += '</select>';
    html += '<label>LoRA</label><select id="engLora"><option value="">none</option>';
    loras.forEach(l => { html += `<option value="${esc(l)}">${esc(l.replace(/\.safetensors$/,''))}</option>`; });
    html += '</select>';
    if (samplerOpts.length) {
      html += '<label>Sampler</label><select id="engSampler"><option value="">default</option>';
      samplerOpts.forEach(s => { html += `<option value="${esc(s)}">${esc(s)}</option>`; });
      html += '</select>';
    }
    if (schedulerOpts.length) {
      html += '<label>Scheduler</label><select id="engScheduler"><option value="">default</option>';
      schedulerOpts.forEach(s => { html += `<option value="${esc(s)}">${esc(s)}</option>`; });
      html += '</select>';
    }
    const stDef = stepsInfo.default || 30;
    html += `<label>Steps</label><input type="number" id="engSteps" min="${stepsInfo.min||1}" max="${Math.min(stepsInfo.max||150,150)}" placeholder="default (${stDef})" inputmode="numeric">`;
    const cfDef = cfgInfo.default || 7;
    html += `<label>CFG</label><input type="number" id="engCfg" min="${cfgInfo.min||1}" max="${Math.min(cfgInfo.max||30,30)}" step="0.5" placeholder="default (${cfDef})" inputmode="decimal">`;
    html += '<label>Extra negative prompt</label><input id="engNeg" placeholder="e.g. text, watermark">';
    html += '<label>Seed (blank = random)</label><input id="engSeed" placeholder="random" inputmode="numeric">';
    el.innerHTML = html;
    el.style.opacity = '1'; el.style.fontSize = ''; el.style.color = '';
  } catch (e) {
    el.innerHTML = '<span style="color:var(--yellow)">Could not load engine controls</span>';
    el.style.opacity = '.6';
  }
}
function collectEngine() {
  const eng = {};
  const v = id => { const e = $(id); return e ? e.value.trim() : ''; };
  if (v('engCkpt')) eng.checkpoint = v('engCkpt');
  if (v('engLora')) eng.lora = v('engLora');
  if (v('engSampler')) eng.sampler_name = v('engSampler');
  if (v('engScheduler')) eng.scheduler = v('engScheduler');
  const steps = v('engSteps'); if (steps) eng.steps = parseInt(steps);
  const cfg = v('engCfg'); if (cfg) eng.cfg = parseFloat(cfg);
  if (v('engNeg')) eng.negative = v('engNeg');
  if (v('engSeed')) eng.seed = v('engSeed');
  return Object.keys(eng).length ? eng : null;
}

/* ── draft-persistence: the Create form survives polling, tab
      changes, and reloads; cleared only after a successful queue ── */
const DRAFT_KEY = 'bh_draft';
function readForm() {
  const slots = {};
  document.querySelectorAll('#slots input').forEach(i => { if (i.value) slots[i.dataset.slot] = i.value; });
  const eng = {};
  ['engCkpt','engLora','engSampler','engScheduler','engSteps','engCfg','engNeg','engSeed'].forEach(id => {
    const e = $(id); if (e && e.value) eng[id] = e.value;
  });
  return { recipe: $('recipe') ? $('recipe').value : '', slots,
           title: $('thumbTitle') ? $('thumbTitle').value : '',
           srcArtifact: window._srcArtifact || null,
           project: $('project') ? $('project').value : 'careyrpg',
           purpose: $('purpose') ? $('purpose').value : '',
           engine: Object.keys(eng).length ? eng : null };
}
function saveDraft() { localStorage.setItem(DRAFT_KEY, JSON.stringify(readForm())); }
function loadDraft() { try { return JSON.parse(localStorage.getItem(DRAFT_KEY)) || null; } catch(e) { return null; } }
function clearDraft() { localStorage.removeItem(DRAFT_KEY); }
function applyDraft(d) {
  if (!d) return;
  const sel = $('recipe');
  if (d.recipe && [...sel.options].some(o => o.value === d.recipe)) sel.value = d.recipe;
  slotFields();
  document.querySelectorAll('#slots input').forEach(i => {
    if (d.slots && d.slots[i.dataset.slot] != null) i.value = d.slots[i.dataset.slot]; });
  if ($('thumbTitle')) $('thumbTitle').value = d.title || '';
  if ($('project')) $('project').value = d.project || 'careyrpg';
  if ($('purpose')) $('purpose').value = d.purpose || '';
  window._srcArtifact = d.srcArtifact || null;
  if (window._srcArtifact && $('srcPreview'))
    $('srcPreview').innerHTML =
      `<span style="color:var(--green)">saved</span> ${esc(window._srcArtifact.name || '')}`
      + `<br><img src="/artifacts/${esc(window._srcArtifact.id)}/file" style="height:52px;border-radius:6px;margin-top:4px">`
      + `<br><button class="s" onclick="clearSource()" style="margin-top:4px">remove</button>`;
  if (d.engine) {
    Object.entries(d.engine).forEach(([id, val]) => {
      const e = $(id); if (e) { e.value = val; e.dispatchEvent(new Event('input')); }
    });
  }
}
/* ── end draft-persistence ── */

async function submitGen() {
  try {
    const d = readForm();
    if (!d.purpose) throw new Error('tell me what this is for (purpose)');
    const title = d.title.trim();
    const srcArt = d.srcArtifact && d.srcArtifact.id ? d.srcArtifact : null;
    if (srcArt && !title) throw new Error('a source image needs a title to composite');
    const payload = { recipe:d.recipe, slots:d.slots, project:d.project, purpose:d.purpose };
    if (title) payload.title = title;
    if (srcArt) payload.source_artifact = srcArt.id;
    const eng = collectEngine();
    if (eng) {
      if (eng.checkpoint) payload.checkpoint = eng.checkpoint;
      if (eng.lora) payload.lora = eng.lora;
      if (eng.negative) payload.negative = eng.negative;
      if (eng.seed) payload.seed = eng.seed;
      payload.engine = {};
      if (eng.sampler_name) payload.engine.sampler_name = eng.sampler_name;
      if (eng.scheduler) payload.engine.scheduler = eng.scheduler;
      if (eng.steps) payload.engine.steps = eng.steps;
      if (eng.cfg) payload.engine.cfg = eng.cfg;
      if (eng.checkpoint) payload.engine.checkpoint = eng.checkpoint;
    }
    const aspect = $('aspect') ? $('aspect').value : '';
    if (aspect) payload.aspect = aspect;
    const cr = currentRecipe();
    if (cr && cr.subject_profile) payload.subject_profile = cr.subject_profile;
    const enhance = $('enhance') && $('enhance').checked && !title && !srcArt && payload.slots.prompt;
    const type = (srcArt || title) ? 'content.thumbnail' : enhance ? 'content.enhance' : 'image.generate';
    if (!srcArt && type !== 'content.enhance') {
      const missing = missingRequiredSlots(d.slots);
      if (missing.length) throw new Error('fill required: ' + missing.join(', '));
    }
    await jpost('/jobs', { type, project:d.project,
      required_mode: srcArt ? 'ANY' : enhance ? 'OPERATOR' : 'IMAGE',
      required_caps: srcArt ? [] : enhance ? ['lmstudio'] : ['comfyui'], payload });
    say('creating...');
    window._srcArtifact = null;
    clearDraft();
    $('view').innerHTML = '';
    render();
  } catch (e) { say(e.message); }
}

    <div class="filter-bar">
      <button class="filter-btn ${_libFilter==='all'?'on':''}" onclick="_libFilter='all';render()">All</button>
      <button class="filter-btn ${_libFilter==='review'?'on':''}" onclick="_libFilter='review';render()">Needs review</button>
      <button class="filter-btn ${_libFilter==='approved'?'on':''}" onclick="_libFilter='approved';render()">Approved</button>
      ${kinds.map(k => `<button class="filter-btn ${_libFilter===k?'on':''}" onclick="_libFilter='${esc(k)}';render()">${esc(k)}</button>`).join('')}
    </div>
    <div class="cards">${filtered.map(a => artCard(a, {showApproval: a.status === 'needs_review'})).join('')
      || '<span class="muted">nothing matches</span>'}</div>
  </div>`;
};

/* ══════════════════════════════════════════════════
   RENDER + POLL LOOP
   ══════════════════════════════════════════════════ */
function typingInView() {
  const ae = document.activeElement;
  return ae && $('view').contains(ae) && ['INPUT','TEXTAREA','SELECT'].includes(ae.tagName);
}
async function render() {
  try {
    if (room === 'create' && $('genForm')) {
      const jobs = await jget('/jobs?limit=30');
      const inflight = busyCards(jobs);
      if ($('genActivity')) $('genActivity').innerHTML = inflight;
      const arts = (await jget('/artifacts?limit=18')).filter(a => a.kind==='image'||a.kind==='thumbnail');
      $('imgOut').innerHTML = `${inflight}${arts.map(a => artCard(a)).join('') || (inflight ? '' : '<span class="muted">nothing yet</span>')}`;
      return;
    }
    if (typingInView()) return;
    $('view').innerHTML = await V[room]();
    if (room === 'create') {
      slotFields();
      showRecipeInfo();
      loadEngineControls().then(() => applyDraft(loadDraft()));
      $('genForm').addEventListener('input', saveDraft);
      $('genForm').addEventListener('change', saveDraft);
    }
  } catch (e) { say('render error: ' + e.message); }
}
let _refreshing = false;
async function tick() {
  if (_refreshing) return;
  _refreshing = true;
  try { await updateSystemDot(); await render(); } finally { _refreshing = false; }
}
function activeJobs() {
  const q = (window._status||{}).queue || {};
  return (q.queued||0) + (q.claimed||0) + (q.running||0);
}
async function loop() {
  if (!document.hidden) await tick();
  setTimeout(loop, activeJobs() ? 4000 : 15000);
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) tick(); });
loop();
</script>
</body>
</html>
