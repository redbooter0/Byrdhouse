version: '3.8'

services:
  # Reverse Proxy - Caddy (SSL, routing, caching)
  caddy:
    image: caddy:2-alpine
    container_name: byrdhouse-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile
      - ./config/caddy_data:/data
      - ./config/caddy_config:/config
    depends_on:
      - byrdhouse-backend
      - odysseus
    networks:
      - byrdhouse-net

  # ByrdHouse Backend (Node.js - Stripe + AI proxy)
  byrdhouse-backend:
    image: node:20-alpine
    container_name: byrdhouse-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - ODYSSEUS_URL=http://odysseus:3000
      - ODYSSEUS_MODEL=${ODYSSEUS_MODEL:-llama3.2:latest}
    command: sh -c "npm install && node server.js"
    networks:
      - byrdhouse-net

  # Odysseus (Python/FastAPI - Home Assistant + Ollama)
  odysseus:
    image: python:3.12-slim
    container_name: byrdhouse-odysseus
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./odysseus:/app
    ports:
      - "3000:3000"
    environment:
      - HOME_ASSISTANT_URL=${HOME_ASSISTANT_URL:-http://homeassistant:8123}
      - HOME_ASSISTANT_TOKEN=${HOME_ASSISTANT_TOKEN}
      - OLLAMA_BASE=${OLLAMA_BASE:-http://ollama:11434}
      - OLLAMA_MODEL_DIR=${OLLAMA_MODEL_DIR:-E:/ollama-models}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 3000"
    networks:
      - byrdhouse-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Ollama (Local LLM) - Optional, enable if running locally
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: byrdhouse-ollama
  #   restart: unless-stopped
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - byrdhouse-net

volumes:
  ollama_data:

networks:
  byrdhouse-net:
    driver: bridge